# Verified 2026-07-22 — image builds and the entrypoint runs correctly
# against a mounted volume (see Dockerfile's header note).
services:
  archiver:
    build: .
    restart: unless-stopped
    environment:
      - ECLIPSE_T=${ECLIPSE_T:-2026-08-12T18:30:00Z}
      - HEALTHCHECK_URL=${HEALTHCHECK_URL:-}
    volumes:
      - ./data:/app/data   # persistent — a missed run is unrecoverable, must survive container recreation
