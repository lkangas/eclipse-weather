<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tool 1 — latest run per model (real data, 10 gridded models)</title>
<style>
  body {
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Consolas, "Liberation Mono", monospace;
    background: #f6f4ef;
    color: #232320;
    margin: 0;
    padding: 24px;
  }
  .controls {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 12px;
    font-size: 11.5px;
    border-top: 1px solid #232320;
    border-bottom: 1px solid #d8d4c8;
    padding: 6px 0;
  }
  .controls label {
    color: #7a776c;
    margin-right: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-size: 9.5px;
  }
  select {
    background: #fff;
    color: #232320;
    border: 1px solid #232320;
    border-radius: 0;
    padding: 3px 6px;
    font-family: inherit;
    font-size: 11.5px;
  }
  #extentInput {
    width: 130px;
    accent-color: #8b3a2f;
    vertical-align: middle;
  }
  #extentReadout {
    font-variant-numeric: tabular-nums;
    color: #55534c;
    margin-left: 4px;
  }
  #cursorReadout {
    margin-left: auto;
    font-variant-numeric: tabular-nums;
    color: #8b3a2f;
    font-weight: 600;
  }
  #stackWrap {
    position: relative;
    border: 1px solid #232320;
    background: #fff;
    padding: 5px 14px 5px 0;
    user-select: none;
    cursor: ew-resize; /* clicking/dragging ANYWHERE in here scrubs the time
      cursor (see script - no proximity gating at all), so the whole area
      should read as horizontally-draggable, not just near the drawn line. */
    touch-action: none; /* this element owns the drag-to-scrub gesture -
      stop the browser's own pan/zoom gestures inside it so touchmove
      dragging (see script) isn't fought over with native scrolling. Scoped
      to this element only, not body - page scroll elsewhere is untouched. */
  }
  .row {
    display: flex;
    align-items: center;
    height: 11px;
    cursor: ew-resize; /* a row click both jumps the time cursor AND selects
      that model in one action - ew-resize (inherited from #stackWrap would
      be overridden by this element's own default otherwise) signals the
      less-discoverable of the two, hover highlighting already covers
      "this row is clickable" via .row:hover below. */
  }
  .row:hover { background: #f6f4ef; }
  .row.selected { background: #f0e8d2; }
  .rowLabel {
    width: 108px;
    flex: none;
    font-size: 9px;
    color: #55534c;
    padding-left: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row.selected .rowLabel { color: #232320; font-weight: 700; }
  .preloadBtn {
    width: 22px;
    flex: none;
    font-size: 8px;
    text-align: center;
    color: #a8a498;
    cursor: pointer;
    font-variant-numeric: tabular-nums;
    position: relative;
  }
  .preloadBtn::before {
    /* Invisible tap-target bump: the row (and so this button) is only 11px
       tall, too small to comfortably hit on a phone, but growing the row
       itself would reflow the whole dense stack. This pseudo-element is
       absolutely positioned (out of flow) so it doesn't change layout at
       all - it only widens the *hit area* for touch/click. */
    content: "";
    position: absolute;
    top: -3px;
    bottom: -3px;
    left: -4px;
    right: -4px;
  }
  .preloadBtn:hover { color: #232320; }
  .preloadBtn.loading { color: #8b3a2f; }
  .preloadBtn.done { color: #2f6f3f; }
  .rowTrack {
    position: relative;
    flex: 1;
    height: 100%;
  }
  .tick {
    position: absolute;
    top: 2px;
    width: 2px;
    height: 7px;
    background: #a19e92;
  }
  .row.selected .tick { background: #8a5a20; }
  .tick.near {
    width: 3px;
    height: 11px;
    top: 0;
    background: #8b3a2f;
  }
  .tick.isInit {
    background: #55534c;
    width: 2px;
    height: 11px;
    top: 0;
  }
  .row.selected .tick.isInit { background: #232320; }
  #nowLine {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 1px;
    background: #2f6f3f;
    pointer-events: none;
    z-index: 4;
    opacity: 0.6;
  }
  #cursorLine {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 1px;
    background: #8b3a2f;
    pointer-events: none;
    z-index: 5;
  }
  #cursorHandle {
    /* No cursor: ew-resize here - it would never actually apply. This
      element inherits pointer-events:none from its parent #cursorLine (it's
      purely decorative, see the script's own note on why), so the browser
      never resolves hover/cursor-shape against it - #stackWrap/.row above
      are what the mouse actually sees. */
    position: absolute;
    top: -7px;
    width: 0;
    height: 0;
    margin-left: -5px;
    border-left: 5px solid transparent;
    border-right: 5px solid transparent;
    border-top: 7px solid #8b3a2f;
    z-index: 6;
  }
  #axisRow {
    display: flex;
    align-items: center;
    height: 14px;
    margin-top: 3px;
    border-top: 1px solid #232320;
  }
  #axisRow .rowLabel, #axisRow .preloadBtn { visibility: hidden; }
  .axisTick {
    position: absolute;
    top: 3px;
    font-size: 9px;
    color: #7a776c;
    transform: translateX(-50%);
  }
  #mapArea {
    margin-top: 18px;
    border: 1px solid #232320;
    background: #fff;
    min-height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
    color: #7a776c;
    font-size: 12px;
    padding: 10px;
  }
  #mapAreaImg { max-width: 100%; display: none; }
  #mapArea .big { font-size: 14px; color: #232320; font-weight: 700; }
  #mapArea .placeholder-tag {
    font-size: 9.5px;
    color: #a8a498;
    text-transform: uppercase;
    letter-spacing: 0.09em;
  }
</style>
</head>
<body>

<div class="controls">
  <div>
    <label for="quantitySelect">Quantity</label>
    <select id="quantitySelect">
      <option value="total">Total cloud</option>
      <option value="low">Low cloud</option>
      <option value="mid">Mid cloud</option>
      <option value="high">High cloud</option>
      <option value="prob_clear">P(low cloud &lt;20%) — ensembles only</option>
      <option value="combined_rain">Combined cloud + rain (not yet designed)</option>
      <option value="surface_temp">Surface temperature (not yet researched)</option>
    </select>
  </div>
  <div>
    <label for="extentInput">Extent</label>
    <input type="range" id="extentInput" min="0" max="1" step="3600000" value="1">
    <span id="extentReadout">384h</span>
  </div>
  <div id="cursorReadout">—</div>
</div>

<div id="stackWrap">
  <div id="rows"></div>
  <div id="axisRow"><div class="rowLabel"></div><div class="preloadBtn"></div><div class="rowTrack" id="axisTrack"></div></div>
  <div id="cursorLine"><div id="cursorHandle"></div></div>
  <div id="nowLine"></div>
</div>

<div id="mapArea">
  <div class="placeholder-tag" id="mapAreaTag">loading manifest…</div>
  <img id="mapAreaImg" alt="">
  <div class="big" id="mapAreaTitle"></div>
  <div id="mapAreaSub">—</div>
</div>

<script>
let MODELS = [];        // [{id, label, runInit (Date), steps: [h,...], imagesByStep: {h: {total,low,mid,high}}}]
let AXIS_START = new Date(), AXIS_END = new Date(); // full span across all loaded models' runs/reach
let axisRightMs = 0;    // current right edge, ms from AXIS_START - narrowed by the extent slider
let selectedModel = null;
let cursorTime = new Date();

const rowsEl = document.getElementById("rows");
const axisTrack = document.getElementById("axisTrack");
const stackWrap = document.getElementById("stackWrap");
const cursorLine = document.getElementById("cursorLine");
const cursorReadout = document.getElementById("cursorReadout");
const nowLine = document.getElementById("nowLine");
const mapAreaTag = document.getElementById("mapAreaTag");
const mapAreaImg = document.getElementById("mapAreaImg");
const mapAreaTitle = document.getElementById("mapAreaTitle");
const mapAreaSub = document.getElementById("mapAreaSub");
const quantitySelect = document.getElementById("quantitySelect");
const extentInput = document.getElementById("extentInput");
const extentReadout = document.getElementById("extentReadout");

let builtRows = []; // [{model, track}] - populated once per manifest load, reused by every relayout

function stepValidTime(model, h) {
  return new Date(model.runInit.getTime() + h * 3600 * 1000);
}

function fmtTime(d) {
  return d.toISOString().slice(0, 16).replace("T", " ") + "Z";
}

function fmtDuration(ms) {
  const h = ms / 3600000;
  return h < 48 ? h.toFixed(0) + "h" : (h / 24).toFixed(1) + "d";
}

async function loadManifest() {
  const resp = await fetch("manifest.json");
  if (!resp.ok) throw new Error("manifest.json fetch failed: HTTP " + resp.status);
  const manifest = await resp.json();

  MODELS = manifest.models.map(m => ({
    id: m.id,
    label: m.label,
    runInit: new Date(m.run_init),
    steps: m.steps.map(s => s.h),
    imagesByStep: Object.fromEntries(m.steps.map(s => [s.h, s.images])),
    // has_data is a per-field manifest addition (patch_manifest_has_data.py) -
    // older manifests won't have it; default to "assume real" rather than
    // hide everything if this widget ever runs against a stale manifest.
    hasDataByStep: Object.fromEntries(m.steps.map(s => [s.h, s.has_data || null])),
  }));

  AXIS_START = new Date(Math.min(...MODELS.map(m => m.runInit.getTime())));
  const reaches = MODELS.map(m => stepValidTime(m, m.steps.length ? Math.max(...m.steps) : 0).getTime());
  AXIS_END = new Date(Math.max(...reaches, AXIS_START.getTime()));
  axisRightMs = Math.max(AXIS_END - AXIS_START, 3600 * 1000);

  extentInput.min = 0;
  extentInput.max = axisRightMs;
  extentInput.step = 3600 * 1000;
  extentInput.value = axisRightMs;
  extentReadout.textContent = fmtDuration(axisRightMs);

  // Default cursor to "now" (clamped into the axis span) rather than the axis
  // start - the whole point of a shared absolute-time cursor is comparing
  // models around the current moment, not around whichever model happens to
  // have archived the oldest run.
  cursorTime = new Date();
  if (cursorTime < AXIS_START) cursorTime = new Date(AXIS_START);
  if (cursorTime - AXIS_START > axisRightMs) cursorTime = new Date(AXIS_START.getTime() + axisRightMs);
}

function pickAxisIntervalMs(spanMs) {
  const hourMs = 3600 * 1000;
  const candidatesH = [1, 2, 3, 6, 12, 24, 48, 96, 168, 336];
  for (const c of candidatesH) {
    if (spanMs / (c * hourMs) <= 10) return c * hourMs;
  }
  return candidatesH[candidatesH.length - 1] * hourMs;
}

function timeToPx(t, trackWidthPx) {
  const frac = (t - AXIS_START) / axisRightMs;
  return Math.round(Math.min(1, Math.max(0, frac)) * trackWidthPx);
}

const IMAGE_FIELDS = ["total", "low", "mid", "high"];
// Known, permanent (not-a-bug) per-model field gaps, confirmed against real
// data - see tool1_renderer.py's corresponding reader docstrings for each:
//   - arome_france/arpege_europe: Meteo-France's SP2 package has no native
//     total-cloud field, only low/mid/high.
//   - ecmwf_ens: classic ECMWF ENS via ecmwf-opendata has no native
//     low/mid/high at all (T01 research) - only AIFS ens has that split.
// P(low cloud <20%) is a per-grid-cell ensemble spread metric (T32's own
// pooled point metric, same threshold, applied per-pixel) - only meaningful
// for a model with genuine multi-member native low-cloud data. Right now
// that's aifs_ens only (aifs_single technically renders too, but degrades
// to a binary 0%/100% map since it's a single deterministic run - not
// listed as a gap since it does produce real output, just a degenerate one).
const PROB_CLEAR_GAP = "Needs an ensemble with native low cloud - only AIFS ENS currently qualifies";
const KNOWN_FIELD_GAPS = {
  arome_france: {
    total: "Meteo-France's SP2 package has no native total-cloud field for this model — try Low/Mid/High",
    prob_clear: PROB_CLEAR_GAP,
  },
  arpege_europe: {
    total: "Meteo-France's SP2 package has no native total-cloud field for this model — try Low/Mid/High",
    prob_clear: PROB_CLEAR_GAP,
  },
  ecmwf_ens: {
    low: "Classic ECMWF ENS has no native low/mid/high cloud split — try Total, or AIFS ENS for a low/mid/high breakdown",
    mid: "Classic ECMWF ENS has no native low/mid/high cloud split — try Total, or AIFS ENS for a low/mid/high breakdown",
    high: "Classic ECMWF ENS has no native low/mid/high cloud split — try Total, or AIFS ENS for a low/mid/high breakdown",
    prob_clear: PROB_CLEAR_GAP,
  },
  gfs: { prob_clear: PROB_CLEAR_GAP },
  gefs_extended: { prob_clear: PROB_CLEAR_GAP },
  ecmwf_hres: { prob_clear: PROB_CLEAR_GAP },
  icon_eu: { prob_clear: PROB_CLEAR_GAP },
  icon_global: { prob_clear: PROB_CLEAR_GAP },
};
const preloadedModels = new Set();

function preloadModel(model, btnEl) {
  if (preloadedModels.has(model.id)) return;
  if (btnEl.classList.contains("loading")) return; // already in flight - a second
    // click here used to start an overlapping preload pass with its own
    // independent `loaded` counter, racing the first and making the shown
    // percentage jump around between the two.
  const urls = [];
  model.steps.forEach(h => {
    const images = model.imagesByStep[h] || {};
    IMAGE_FIELDS.forEach(f => { if (images[f]) urls.push(images[f]); });
  });
  if (!urls.length) return;

  btnEl.classList.add("loading");
  btnEl.classList.remove("done");
  let loaded = 0;
  btnEl.textContent = "0%";
  urls.forEach(url => {
    const img = new Image();
    img.onload = img.onerror = () => {
      loaded++;
      btnEl.textContent = Math.round((loaded / urls.length) * 100) + "%";
      if (loaded === urls.length) {
        preloadedModels.add(model.id);
        btnEl.classList.remove("loading");
        btnEl.classList.add("done");
        btnEl.textContent = "✓";
      }
    };
    img.src = url;
  });
}

function buildRows() {
  rowsEl.innerHTML = "";
  builtRows = [];
  MODELS.forEach(model => {
    const row = document.createElement("div");
    row.className = "row";
    row.dataset.modelId = model.id;

    const label = document.createElement("div");
    label.className = "rowLabel";
    label.textContent = model.label;
    row.appendChild(label);

    const preloadBtn = document.createElement("div");
    preloadBtn.className = "preloadBtn";
    preloadBtn.textContent = "⤓";
    preloadBtn.title = "Preload all frames for " + model.label + " (smoother scrubbing)";
    preloadBtn.addEventListener("click", e => {
      e.stopPropagation(); // don't also trigger the row's own select-on-click
      preloadModel(model, preloadBtn);
    });
    row.appendChild(preloadBtn);

    const track = document.createElement("div");
    track.className = "rowTrack";
    row.appendChild(track);

    row.addEventListener("click", () => selectModel(model.id));
    rowsEl.appendChild(row);
    builtRows.push({ model, track });
  });
}

function layoutTicks() {
  const trackWidthPx = axisTrack.getBoundingClientRect().width;
  builtRows.forEach(({ model, track }) => {
    track.innerHTML = "";
    model.steps.forEach(h => {
      const vt = stepValidTime(model, h);
      if (vt - AXIS_START > axisRightMs) return;
      const tick = document.createElement("div");
      tick.className = "tick" + (h === 0 ? " isInit" : "");
      tick.style.left = timeToPx(vt, trackWidthPx) + "px";
      tick.dataset.hour = h;
      track.appendChild(tick);
    });
  });

  axisTrack.innerHTML = "";
  const intervalMs = pickAxisIntervalMs(axisRightMs);
  for (let ms = 0; ms <= axisRightMs; ms += intervalMs) {
    const t = new Date(AXIS_START.getTime() + ms);
    const el = document.createElement("div");
    el.className = "axisTick";
    el.style.left = timeToPx(t, trackWidthPx) + "px";
    el.textContent = t.toISOString().slice(5, 16).replace("T", " ");
    axisTrack.appendChild(el);
  }

  const trackRect = axisTrack.getBoundingClientRect();
  const wrapRect = stackWrap.getBoundingClientRect();
  const trackOffsetPx = trackRect.left - wrapRect.left;
  const now = new Date();
  if (now >= AXIS_START && now - AXIS_START <= axisRightMs) {
    nowLine.style.display = "block";
    nowLine.style.left = Math.round(trackOffsetPx + timeToPx(now, trackRect.width)) + "px";
  } else {
    nowLine.style.display = "none";
  }
}

function nearestStep(model, targetTime) {
  // Only consider steps still inside the extent slider's current window
  // (same fix as Tool 2's own nearestStep - see that file for the full
  // rationale): without this, a step the slider has hidden past a cadence
  // gap can be picked as "nearest" even though nothing on the visible,
  // narrowed axis corresponds to it.
  const visible = model.steps.filter(h => stepValidTime(model, h) - AXIS_START <= axisRightMs);
  if (!visible.length) return null;
  return visible.reduce((best, h) =>
    Math.abs(stepValidTime(model, h) - targetTime) < Math.abs(stepValidTime(model, best) - targetTime) ? h : best
  );
}

function selectModel(modelId) {
  selectedModel = modelId;
  document.querySelectorAll(".row").forEach(r => {
    r.classList.toggle("selected", r.dataset.modelId === modelId);
  });
  updateCursorUI();
}

function updateCursorUI() {
  const trackRect = axisTrack.getBoundingClientRect();
  const wrapRect = stackWrap.getBoundingClientRect();
  const trackOffsetPx = trackRect.left - wrapRect.left;
  const leftPx = trackOffsetPx + timeToPx(cursorTime, trackRect.width);
  cursorLine.style.left = Math.round(leftPx) + "px";
  cursorReadout.textContent = "cursor " + fmtTime(cursorTime);

  document.querySelectorAll(".row").forEach(rowEl => {
    const model = MODELS.find(m => m.id === rowEl.dataset.modelId);
    const nearest = nearestStep(model, cursorTime);
    rowEl.querySelectorAll(".tick").forEach(tickEl => {
      tickEl.classList.toggle("near", parseFloat(tickEl.dataset.hour) === nearest);
    });
  });

  if (!selectedModel) {
    mapAreaTag.textContent = "select a model";
    mapAreaImg.style.display = "none";
    mapAreaTitle.textContent = "";
    mapAreaSub.textContent = "—";
    return;
  }

  const model = MODELS.find(m => m.id === selectedModel);
  const step = nearestStep(model, cursorTime);
  const field = quantitySelect.value;
  const images = step === null ? null : model.imagesByStep[step];
  const hasDataFlags = step === null ? null : model.hasDataByStep[step];
  // hasDataFlags[field] === false means this field has a URL (always
  // written, even as a "(no data)" placeholder) but no real underlying
  // data - null (no has_data info, e.g. a stale manifest) falls back to
  // "assume real" so this widget doesn't break against an older manifest.
  const fieldHasData = hasDataFlags ? hasDataFlags[field] !== false : true;
  const url = images && fieldHasData ? images[field] : null;

  if (url) {
    mapAreaTag.textContent = "real rendered frame";
    mapAreaImg.src = url;
    mapAreaImg.style.display = "block";
    mapAreaTitle.textContent = model.label + " · run " + fmtTime(model.runInit);
    mapAreaSub.textContent = "step +" + step + "h  ·  valid " + fmtTime(stepValidTime(model, step));
  } else {
    mapAreaTag.textContent = "not available";
    mapAreaImg.style.display = "none";
    mapAreaTitle.textContent = model.label;
    const knownReason = (KNOWN_FIELD_GAPS[model.id] || {})[field];
    mapAreaSub.textContent = step === null
      ? "no step available"
      : (field === "combined_rain" || field === "surface_temp"
          ? "quantity not implemented yet"
          : (knownReason || "no rendered frame for this field/step"));
  }
}

function timeFromClientX(clientX) {
  const rect = axisTrack.getBoundingClientRect();
  const frac = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
  return new Date(AXIS_START.getTime() + frac * axisRightMs);
}

let dragging = false;
function startDrag(clientX) { dragging = true; cursorTime = timeFromClientX(clientX); updateCursorUI(); }
function moveDrag(clientX) { if (dragging) { cursorTime = timeFromClientX(clientX); updateCursorUI(); } }
function endDrag() { dragging = false; }

stackWrap.addEventListener("mousedown", e => startDrag(e.clientX));
window.addEventListener("mousemove", e => moveDrag(e.clientX));
window.addEventListener("mouseup", endDrag);
quantitySelect.addEventListener("change", updateCursorUI);

// Touch support - reuses the exact same startDrag/moveDrag/endDrag functions
// the mouse handlers above call, just fed touch coordinates instead of mouse
// ones. No separate touch-vs-mouse hit-zone tolerance here: unlike a
// "grab the handle precisely" widget, this file's drag surface has no
// proximity gating at all - mousedown/touchstart anywhere inside #stackWrap
// already jumps the cursor there and starts dragging (cursorHandle is purely
// decorative; it inherits pointer-events:none from #cursorLine), so there's
// no tolerance constant to widen.
stackWrap.addEventListener("touchstart", e => {
  if (!e.touches.length) return;
  startDrag(e.touches[0].clientX);
}, { passive: true });
window.addEventListener("touchmove", e => {
  if (!dragging) return; // let untouched scrolling/other controls behave normally
  if (!e.touches.length) return;
  e.preventDefault(); // only while a drag is actually in progress
  moveDrag(e.touches[0].clientX);
}, { passive: false });
window.addEventListener("touchend", endDrag);
window.addEventListener("touchcancel", endDrag); // e.g. OS interrupts the touch mid-drag

extentInput.addEventListener("input", () => {
  axisRightMs = parseInt(extentInput.value, 10);
  extentReadout.textContent = fmtDuration(axisRightMs);
  cursorTime = new Date(Math.min(cursorTime.getTime(), AXIS_START.getTime() + axisRightMs));
  layoutTicks();
  updateCursorUI();
});

let resizePending = false;
window.addEventListener("resize", () => {
  if (resizePending) return;
  resizePending = true;
  requestAnimationFrame(() => {
    layoutTicks();
    updateCursorUI();
    resizePending = false;
  });
});

loadManifest()
  .then(() => {
    buildRows();
    layoutTicks();
    if (MODELS.length) selectModel(MODELS[0].id);
    updateCursorUI();
  })
  .catch(err => {
    mapAreaTag.textContent = "error";
    mapAreaTitle.textContent = "failed to load manifest.json";
    mapAreaSub.textContent = String(err);
    console.error(err);
  });
</script>
</body>
</html>
