<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tool 2 — one model, stacked historical runs (mock data)</title>
<style>
  body {
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Consolas, "Liberation Mono", monospace;
    background: #f6f4ef;
    color: #232320;
    margin: 0;
    padding: 24px;
  }
  .controls {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 12px;
    font-size: 11.5px;
    border-top: 1px solid #232320;
    border-bottom: 1px solid #d8d4c8;
    padding: 6px 0;
  }
  .controls label {
    color: #7a776c;
    margin-right: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-size: 9.5px;
  }
  select {
    background: #fff;
    color: #232320;
    border: 1px solid #232320;
    border-radius: 0;
    padding: 3px 6px;
    font-family: inherit;
    font-size: 11.5px;
  }
  #extentInput {
    width: 160px;
    accent-color: #8b3a2f;
    vertical-align: middle;
  }
  #extentReadout {
    font-variant-numeric: tabular-nums;
    color: #55534c;
    margin-left: 4px;
    white-space: nowrap;
  }
  #cursorReadout {
    margin-left: auto;
    font-variant-numeric: tabular-nums;
    color: #8b3a2f;
    font-weight: 600;
    white-space: nowrap;
  }
  #stackWrap {
    position: relative;
    border: 1px solid #232320;
    background: #fff;
    padding: 5px 14px 5px 0;
    user-select: none;
    cursor: default;
  }
  #stackWrap.hint-time { cursor: ew-resize; }
  #stackWrap.hint-row { cursor: ns-resize; }
  .row {
    display: flex;
    align-items: center;
    height: 13px;
  }
  .row:hover { background: #f6f4ef; }
  .row.selected { background: #f0e8d2; }
  .rowLabel {
    width: 130px;
    flex: none;
    font-size: 9.5px;
    color: #55534c;
    padding-left: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row.selected .rowLabel { color: #232320; font-weight: 700; }
  .rowLabel .age { color: #a8a498; margin-left: 4px; }
  .row.selected .rowLabel .age { color: #8a7a5a; }
  .preloadBtn {
    width: 22px;
    flex: none;
    font-size: 8px;
    text-align: center;
    color: #a8a498;
    cursor: pointer;
    font-variant-numeric: tabular-nums;
  }
  .preloadBtn:hover { color: #232320; }
  .preloadBtn.loading { color: #8b3a2f; }
  .preloadBtn.done { color: #2f6f3f; }
  .rowTrack {
    position: relative;
    flex: 1;
    height: 100%;
  }
  .tick {
    position: absolute;
    top: 3px;
    width: 2px;
    height: 7px;
    background: #a19e92;
  }
  .row.selected .tick { background: #8a5a20; }
  .tick.near {
    width: 3px;
    height: 13px;
    top: 0;
    background: #8b3a2f;
  }
  .tick.isInit {
    background: #55534c;
    width: 2px;
    height: 13px;
    top: 0;
  }
  .row.selected .tick.isInit { background: #232320; }
  #cursorLine {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 1px;
    background: #8b3a2f;
    pointer-events: none;
    z-index: 5;
  }
  #cursorHandle {
    position: absolute;
    top: -7px;
    width: 0;
    height: 0;
    margin-left: -5px;
    border-left: 5px solid transparent;
    border-right: 5px solid transparent;
    border-top: 7px solid #8b3a2f;
    cursor: ew-resize;
    z-index: 6;
  }
  #nowLine {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 1px;
    background: #2f6f3f;
    pointer-events: none;
    z-index: 4;
    opacity: 0.6;
  }
  #axisRow {
    display: flex;
    align-items: center;
    height: 14px;
    margin-top: 3px;
    border-top: 1px solid #232320;
  }
  #axisRow .rowLabel, #axisRow .preloadBtn { visibility: hidden; }
  .axisTick {
    position: absolute;
    top: 3px;
    font-size: 9px;
    color: #7a776c;
    transform: translateX(-50%);
    white-space: nowrap;
  }
  #mapArea {
    margin-top: 18px;
    border: 1px solid #232320;
    background: #fff;
    min-height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
    color: #7a776c;
    font-size: 12px;
    padding: 10px;
  }
  #mapArea .big { font-size: 14px; color: #232320; font-weight: 700; }
  #mapArea .placeholder-tag {
    font-size: 9.5px;
    color: #a8a498;
    text-transform: uppercase;
    letter-spacing: 0.09em;
  }
  .legend {
    font-size: 9.5px;
    color: #7a776c;
    margin-top: 6px;
  }
  .legend span { margin-right: 16px; }
  .legend .sw { display: inline-block; width: 9px; height: 9px; vertical-align: -1px; margin-right: 3px; }
</style>
</head>
<body>

<div class="controls">
  <div>
    <label for="modelSelect">Model</label>
    <select id="modelSelect"></select>
  </div>
  <div>
    <label for="quantitySelect">Quantity</label>
    <select id="quantitySelect">
      <option value="total">Total cloud</option>
      <option value="low">Low cloud</option>
      <option value="mid">Mid cloud</option>
      <option value="high">High cloud</option>
    </select>
  </div>
  <div>
    <label for="extentInput">Extent</label>
    <input type="range" id="extentInput" min="0" max="100" value="100">
    <span id="extentReadout">—</span>
  </div>
  <div id="cursorReadout">—</div>
</div>

<div id="stackWrap">
  <div id="rows"></div>
  <div id="axisRow"><div class="rowLabel"></div><div class="preloadBtn"></div><div class="rowTrack" id="axisTrack"></div></div>
  <div id="cursorLine"><div id="cursorHandle"></div></div>
  <div id="nowLine"></div>
</div>

<div class="legend">
  <span><span class="sw" style="background:#55534c"></span>run init</span>
  <span><span class="sw" style="background:#a19e92"></span>archived step</span>
  <span><span class="sw" style="background:#8b3a2f"></span>nearest to cursor</span>
  <span><span class="sw" style="background:#2f6f3f;opacity:.6"></span>now</span>
</div>

<div id="mapArea">
  <div class="placeholder-tag" id="mapAreaTag">select a run</div>
  <img id="mapAreaImg" alt="" style="max-width:100%; display:none;">
  <div class="big" id="mapAreaTitle"></div>
  <div id="mapAreaSub">—</div>
</div>

<script>
// ---------------------------------------------------------------------------
// MOCK DATA — stands in for a future per-model manifest listing every
// archived run_init and its steps. Shapes 3 real models with real cadence
// differences (per config/models.yaml) so the model-switch interaction gets
// exercised against realistically different axis spans, not just relabeled
// copies of the same series.
// ---------------------------------------------------------------------------
const NOW = new Date("2026-07-23T15:30:00Z");

function genSteps(maxH, cadenceH) {
  const steps = [0];
  for (let h = cadenceH; h <= maxH; h += cadenceH) steps.push(h);
  return steps;
}

function genRuns(cycleHours, maxH, cadenceH, lookbackRuns) {
  const runs = [];
  // Walk backward from the most recent completed cycle boundary.
  let t = new Date(NOW);
  t.setUTCMinutes(0, 0, 0);
  while (!cycleHours.includes(t.getUTCHours())) t = new Date(t - 3600 * 1000);
  for (let i = 0; i < lookbackRuns; i++) {
    runs.push({ runInit: new Date(t), steps: genSteps(maxH, cadenceH) });
    // step back to the previous cycle hour
    do { t = new Date(t - 3600 * 1000); } while (!cycleHours.includes(t.getUTCHours()));
  }
  return runs.reverse(); // oldest first; row-building reverses again for newest-on-top
}

const MOCK_MODELS = {
  gfs: {
    label: "GFS",
    runs: genRuns([0, 6, 12, 18], 384, 3, 10),
  },
  aifs_ens: {
    label: "AIFS ENS",
    runs: genRuns([0, 6, 12, 18], 360, 6, 4), // fewest runs archived so far - slow/heavy fetch
  },
  icon_eu: {
    label: "ICON EU",
    runs: genRuns([0, 6, 12, 18], 78, 1, 9), // short reach, dense hourly cadence
  },
};
// ---------------------------------------------------------------------------

let selectedModelId = null;
let selectedRunIdx = null; // index into the currently-built row list
let cursorTime = NOW;      // Date
let AXIS_START = NOW, AXIS_END = NOW; // full span for the current model
let axisRightMs = 0;       // current right edge, narrowed by the extent slider

const modelSelect = document.getElementById("modelSelect");
const quantitySelect = document.getElementById("quantitySelect");
const extentInput = document.getElementById("extentInput");
const extentReadout = document.getElementById("extentReadout");
const rowsEl = document.getElementById("rows");
const axisTrack = document.getElementById("axisTrack");
const stackWrap = document.getElementById("stackWrap");
const cursorLine = document.getElementById("cursorLine");
const cursorReadout = document.getElementById("cursorReadout");
const nowLine = document.getElementById("nowLine");
const mapAreaTag = document.getElementById("mapAreaTag");
const mapAreaImg = document.getElementById("mapAreaImg");
const mapAreaTitle = document.getElementById("mapAreaTitle");
const mapAreaSub = document.getElementById("mapAreaSub");

let builtRows = []; // [{run, track}], newest-on-top order — populated per model load

function fmtTime(d) {
  return d.toISOString().slice(0, 16).replace("T", " ") + "Z";
}
function fmtRunLabel(d) {
  return d.toISOString().slice(5, 16).replace("T", " ") + "Z";
}
function fmtAge(runInit) {
  const h = Math.round((NOW - runInit) / 3600000);
  if (h < 24) return h + "h ago";
  return (h / 24).toFixed(1) + "d ago";
}
function stepValidTime(run, h) {
  return new Date(run.runInit.getTime() + h * 3600 * 1000);
}

function populateModelSelect() {
  modelSelect.innerHTML = "";
  Object.entries(MOCK_MODELS).forEach(([id, m]) => {
    const opt = document.createElement("option");
    opt.value = id;
    opt.textContent = m.label + " (" + m.runs.length + " runs archived)";
    modelSelect.appendChild(opt);
  });
}

function loadModel(modelId) {
  selectedModelId = modelId;
  const model = MOCK_MODELS[modelId];
  const runsNewestFirst = [...model.runs].reverse();

  AXIS_START = runsNewestFirst[runsNewestFirst.length - 1].runInit;
  const reaches = model.runs.map(r => stepValidTime(r, Math.max(...r.steps)));
  AXIS_END = new Date(Math.max(...reaches.map(d => d.getTime())));

  const fullSpanMs = AXIS_END - AXIS_START;
  extentInput.min = 0;
  extentInput.max = fullSpanMs;
  extentInput.step = 3600 * 1000; // 1h granularity
  extentInput.value = fullSpanMs;
  axisRightMs = fullSpanMs;

  rowsEl.innerHTML = "";
  builtRows = [];
  runsNewestFirst.forEach((run, idx) => {
    const row = document.createElement("div");
    row.className = "row";
    row.dataset.idx = idx;

    const label = document.createElement("div");
    label.className = "rowLabel";
    label.innerHTML = fmtRunLabel(run.runInit) + '<span class="age">' + fmtAge(run.runInit) + "</span>";
    row.appendChild(label);

    const preloadBtn = document.createElement("div");
    preloadBtn.className = "preloadBtn";
    preloadBtn.textContent = "⤓";
    preloadBtn.title = "Preload all frames for this run (mock — no-op in prototype)";
    preloadBtn.addEventListener("click", e => e.stopPropagation());
    row.appendChild(preloadBtn);

    const track = document.createElement("div");
    track.className = "rowTrack";
    row.appendChild(track);

    rowsEl.appendChild(row);
    builtRows.push({ run, row, track });
  });

  cursorTime = new Date(Math.min(Math.max(cursorTime.getTime(), AXIS_START.getTime()), AXIS_START.getTime() + axisRightMs));
  layoutTicks();
  selectRun(0); // newest run by default
}

function pickAxisIntervalMs(spanMs) {
  const hourMs = 3600 * 1000;
  const candidatesH = [1, 2, 3, 6, 12, 24, 48, 96, 168, 336];
  for (const c of candidatesH) {
    if (spanMs / (c * hourMs) <= 8) return c * hourMs;
  }
  return candidatesH[candidatesH.length - 1] * hourMs;
}

function timeToPx(t, trackWidthPx) {
  const frac = (t - AXIS_START) / axisRightMs;
  return Math.round(Math.min(1, Math.max(0, frac)) * trackWidthPx);
}

function layoutTicks() {
  const trackWidthPx = axisTrack.getBoundingClientRect().width;
  builtRows.forEach(({ run, track }) => {
    track.innerHTML = "";
    run.steps.forEach(h => {
      const vt = stepValidTime(run, h);
      if (vt - AXIS_START > axisRightMs) return;
      const tick = document.createElement("div");
      tick.className = "tick" + (h === 0 ? " isInit" : "");
      tick.style.left = timeToPx(vt, trackWidthPx) + "px";
      tick.dataset.hour = h;
      tick.dataset.validMs = vt.getTime();
      track.appendChild(tick);
    });
  });

  axisTrack.innerHTML = "";
  const intervalMs = pickAxisIntervalMs(axisRightMs);
  for (let ms = 0; ms <= axisRightMs; ms += intervalMs) {
    const t = new Date(AXIS_START.getTime() + ms);
    const el = document.createElement("div");
    el.className = "axisTick";
    el.style.left = timeToPx(t, trackWidthPx) + "px";
    el.textContent = t.toISOString().slice(5, 16).replace("T", " ");
    axisTrack.appendChild(el);
  }

  const nowPx = timeToPx(NOW, trackWidthPx);
  const trackRect = axisTrack.getBoundingClientRect();
  const wrapRect = stackWrap.getBoundingClientRect();
  const trackOffsetPx = trackRect.left - wrapRect.left;
  if (NOW >= AXIS_START && NOW - AXIS_START <= axisRightMs) {
    nowLine.style.display = "block";
    nowLine.style.left = Math.round(trackOffsetPx + nowPx) + "px";
  } else {
    nowLine.style.display = "none";
  }
}

function nearestStep(run, targetTime) {
  if (!run.steps.length) return null;
  return run.steps.reduce((best, h) => {
    const bestDiff = Math.abs(stepValidTime(run, best) - targetTime);
    const diff = Math.abs(stepValidTime(run, h) - targetTime);
    return diff < bestDiff ? h : best;
  });
}

function selectRun(idx) {
  selectedRunIdx = idx;
  document.querySelectorAll(".row").forEach(r => {
    r.classList.toggle("selected", parseInt(r.dataset.idx, 10) === idx);
  });
  updateCursorUI();
}

function updateCursorUI() {
  const trackRect = axisTrack.getBoundingClientRect();
  const wrapRect = stackWrap.getBoundingClientRect();
  const trackOffsetPx = trackRect.left - wrapRect.left;
  const leftPx = trackOffsetPx + timeToPx(cursorTime, trackRect.width);
  cursorLine.style.left = Math.round(leftPx) + "px";
  cursorReadout.textContent = "cursor " + fmtTime(cursorTime);

  builtRows.forEach(({ run, track }, idx) => {
    const nearest = nearestStep(run, cursorTime);
    track.querySelectorAll(".tick").forEach(tickEl => {
      tickEl.classList.toggle("near", parseFloat(tickEl.dataset.hour) === nearest);
    });
  });

  if (selectedRunIdx === null || !builtRows[selectedRunIdx]) {
    mapAreaTag.textContent = "select a run";
    mapAreaImg.style.display = "none";
    mapAreaTitle.textContent = "";
    mapAreaSub.textContent = "—";
    return;
  }

  const { run } = builtRows[selectedRunIdx];
  const step = nearestStep(run, cursorTime);
  const field = quantitySelect.value;

  // Mock rendering: no real images exist yet, so just describe what WOULD
  // be shown (model/run/step/field/valid-time) — same information Tool 1's
  // real mapArea shows, minus an actual <img>.
  mapAreaTag.textContent = "mock frame (no real render behind this yet)";
  mapAreaImg.style.display = "none";
  mapAreaTitle.textContent = MOCK_MODELS[selectedModelId].label + " · run " + fmtTime(run.runInit);
  mapAreaSub.textContent = "step +" + step + "h  ·  valid " + fmtTime(stepValidTime(run, step)) + "  ·  field: " + field;
}

function timeFromClientX(clientX) {
  const rect = axisTrack.getBoundingClientRect();
  const frac = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
  return new Date(AXIS_START.getTime() + frac * axisRightMs);
}

// Two independent drag handles, each only grabbable near its OWN current
// position: the vertical (time) cursor horizontally, the horizontal (row)
// cursor vertically - the latter has no drawn line, the row highlight IS
// its visual. Clicking away from both still jumps both immediately (today's
// behavior); dragging only "sticks" to a handle grabbed within its hit zone.
const CURSOR_HIT_PX = 8;   // horizontal tolerance around the vertical cursor line
const ROW_HIT_PAD_PX = 6;  // vertical tolerance around the selected row's own band

function isNearCursorLine(clientX) {
  const rect = cursorLine.getBoundingClientRect();
  return Math.abs(clientX - (rect.left + rect.width / 2)) <= CURSOR_HIT_PX;
}

function isNearSelectedRow(clientY) {
  if (selectedRunIdx === null || !builtRows[selectedRunIdx]) return false;
  const r = builtRows[selectedRunIdx].row.getBoundingClientRect();
  return clientY >= r.top - ROW_HIT_PAD_PX && clientY <= r.bottom + ROW_HIT_PAD_PX;
}

function rowIndexAtClientY(clientY) {
  if (!builtRows.length) return null;
  for (let i = 0; i < builtRows.length; i++) {
    const r = builtRows[i].row.getBoundingClientRect();
    if (clientY >= r.top && clientY <= r.bottom) return i;
  }
  if (clientY < builtRows[0].row.getBoundingClientRect().top) return 0;
  if (clientY > builtRows[builtRows.length - 1].row.getBoundingClientRect().bottom) return builtRows.length - 1;
  return null;
}

// Precedence: the vertical (time) cursor wins where both hit zones overlap.
function hitZoneAt(clientX, clientY) {
  if (isNearCursorLine(clientX)) return "time";
  if (isNearSelectedRow(clientY)) return "row";
  return null;
}

function applyHoverHint(clientX, clientY) {
  const zone = hitZoneAt(clientX, clientY);
  stackWrap.classList.toggle("hint-time", zone === "time");
  stackWrap.classList.toggle("hint-row", zone === "row");
}

let dragMode = null; // "time" | "row" | null (a plain click, no continued drag-follow)

function startDrag(clientX, clientY) {
  dragMode = hitZoneAt(clientX, clientY);
  if (dragMode === "time") {
    cursorTime = timeFromClientX(clientX);
    updateCursorUI();
  } else if (dragMode === "row") {
    const idx = rowIndexAtClientY(clientY);
    if (idx !== null) selectRun(idx);
  } else {
    // Away from both handles: plain click still jumps both, same as before.
    cursorTime = timeFromClientX(clientX);
    const idx = rowIndexAtClientY(clientY);
    if (idx !== null) selectRun(idx); else updateCursorUI();
  }
  applyHoverHint(clientX, clientY);
}

function moveDrag(clientX, clientY) {
  if (dragMode === "time") {
    cursorTime = timeFromClientX(clientX);
    updateCursorUI();
  } else if (dragMode === "row") {
    const idx = rowIndexAtClientY(clientY);
    if (idx !== null && idx !== selectedRunIdx) selectRun(idx);
  }
  applyHoverHint(clientX, clientY);
}

function endDrag() { dragMode = null; }

stackWrap.addEventListener("mousedown", e => {
  if (e.target.closest(".preloadBtn")) return;
  startDrag(e.clientX, e.clientY);
});
window.addEventListener("mousemove", e => moveDrag(e.clientX, e.clientY));
window.addEventListener("mouseup", endDrag);
quantitySelect.addEventListener("change", updateCursorUI);
modelSelect.addEventListener("change", () => loadModel(modelSelect.value));

extentInput.addEventListener("input", () => {
  axisRightMs = parseInt(extentInput.value, 10);
  const spanH = axisRightMs / 3600000;
  extentReadout.textContent = spanH < 48 ? spanH.toFixed(0) + "h" : (spanH / 24).toFixed(1) + "d";
  cursorTime = new Date(Math.min(cursorTime.getTime(), AXIS_START.getTime() + axisRightMs));
  layoutTicks();
  updateCursorUI();
});

let resizePending = false;
window.addEventListener("resize", () => {
  if (resizePending) return;
  resizePending = true;
  requestAnimationFrame(() => {
    layoutTicks();
    updateCursorUI();
    resizePending = false;
  });
});

populateModelSelect();
loadModel(modelSelect.value);
</script>
</body>
</html>
